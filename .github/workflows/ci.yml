name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Hub `next.config` validates prod origins at build time; values are only used for rewrite URLs in CI.
      CODENAMES_PROD_ORIGIN: https://ci.codenames.minigames.invalid
      SPYFALL_PROD_ORIGIN: https://ci.spyfall.minigames.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
